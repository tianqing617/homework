<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>二年级450以内口算题 - Math Worksheet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&amp;family=Ma+Shan+Zheng&amp;family=Nunito:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <style data-purpose="page-layout">
        body {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
            background-color: #f8f9fa;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.05"/></svg>');
            font-family: "Nunito", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 0;
        }
        .page-container {
            width: 210mm;
            min-height: 297mm;
            background: #ffffff;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            overflow: hidden;
          padding-top: 10px;
        }
        @media print {
            body {
                background: none;
                padding: 0;
            }
            .page-container {
                box-shadow: none;
                border: none;
                margin: 0;
                width: 100%;
            }
            .no-print, button {
                display: none !important;
            }
        }
    </style>
    <style data-purpose="doodle-styles">
        .hand-drawn-border {
            border: 2px solid #2d2a26;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            background-color: #fffaf0;
            cursor: pointer;
        }
        .header-banner {
            position: relative;
            display: inline-block;
            padding: 8px 60px;
            border-top: 3px solid #2d2a26;
            border-bottom: 3px solid #2d2a26;
            background: #fff;
        }
        .header-banner::before,
        .header-banner::after {
            content: '';
            position: absolute;
            top: -3px;
            bottom: -3px;
            width: 30px;
            border: 3px solid #2d2a26;
            z-index: -1;
        }
        .header-banner::before {
            left: -15px;
            border-right: none;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
            background: #fff;
        }
        .header-banner::after {
            right: -15px;
            border-left: none;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            background: #fff;
        }
        .hand-underline {
            border-bottom: 3px solid #2d2a26;
            border-radius: 4px 2px 5px 3px/2px 4px 3px 2px;
            display: inline-block;
            min-width: 100px;
        }
        .playful-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }
    </style>
    <style data-purpose="decorative-elements">
        .doodle {
            position: absolute;
            pointer-events: none;
        }
        /* Style for the grid container from JS */
        #problems {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.05rem;
            color: #1a1a1a;
            font-weight: 600;
        }
        .problem-line {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 24px;
        }
        /* Add dashed divider after the 15th row */
        .problem-line:nth-child(15) {
            border-bottom: 3px dashed #2d2a26;
            padding-bottom: 12px;
            margin-bottom: 8px;
        }
        .problem {
            white-space: nowrap;
        }
    </style>
</head>
<body>
<!-- Top Controls -->
<div class="no-print flex justify-center gap-4 mb-8">
    <button class="hand-drawn-border px-6 py-2 flex items-center gap-3 hover:bg-orange-50 transition-colors shadow-sm" onclick="generateProblems()">
        <svg fill="none" height="24" stroke="#a67c52" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24">
            <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
        </svg>
        <div class="text-left leading-tight">
            <div class="font-bold text-sm text-gray-800">刷新题目</div>
            <div class="text-xs text-gray-500">(Refresh)</div>
        </div>
    </button>
    <button class="hand-drawn-border px-6 py-2 flex items-center gap-3 hover:bg-orange-50 transition-colors shadow-sm" onclick="window.print()">
        <svg fill="none" height="24" stroke="#a67c52" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24">
            <polyline points="6 9 6 2 18 2 18 9"></polyline>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
            <rect height="8" width="12" x="6" y="14"></rect>
        </svg>
        <div class="text-left leading-tight">
            <div class="font-bold text-sm text-gray-800">打印练习</div>
            <div class="text-xs text-gray-500">(Print)</div>
        </div>
    </button>
</div>
    <div class="page-container" id="printable-area">

        <!-- SVG Doodles -->
        <svg class="doodle" fill="none" style="top: 60px;left: 0px;width: 50px;height: 50px;" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M25 50C25 35 35 25 50 25C65 25 75 35 75 50C75 65 65 80 50 80C35 80 25 65 25 50Z" fill="#fff" stroke="#2d2a26" stroke-width="2"></path>
            <path d="M35 35 Q40 30 45 35 M65 35 Q60 30 55 35" fill="none" stroke="#2d2a26" stroke-width="2"></path>
            <circle cx="40" cy="45" fill="#fff" r="6" stroke="#2d2a26" stroke-width="2"></circle>
            <circle cx="60" cy="45" fill="#fff" r="6" stroke="#2d2a26" stroke-width="2"></circle>
            <circle cx="40" cy="45" fill="#2d2a26" r="2"></circle>
            <circle cx="60" cy="45" fill="#2d2a26" r="2"></circle>
            <path d="M47 52 L50 58 L53 52 Z" fill="#fff" stroke="#2d2a26" stroke-width="1.5"></path>
            <path d="M30 25 L25 15 L35 20 M70 25 L75 15 L65 20" fill="none" stroke="#2d2a26" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
            <path d="M40 70 Q50 75 60 70" fill="none" stroke="#2d2a26" stroke-width="1.5"></path>
            <path d="M35 80 L30 85 M40 80 L35 85 M65 80 L70 85 M60 80 L65 85" stroke="#2d2a26" stroke-linecap="round" stroke-width="2"></path>
        </svg>


        <svg class="doodle" fill="none" style="top: 190px;left: 7px;width: 30px;height: 30px;" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
            <path d="M25 5L30 18H45L33 26L37 40L25 32L13 40L17 26L5 18H20L25 5Z" fill="#ffd54f" stroke="#2d2a26" stroke-linejoin="round" stroke-width="2"></path>
        </svg>

        <svg class="doodle" fill="none" style="bottom: 10px;right: 20px;width: 25px;height: 25px;" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
            <path d="M25 5L30 18H45L33 26L37 40L25 32L13 40L17 26L5 18H20L25 5Z" fill="#ffd54f" stroke="#2d2a26" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
        <svg class="doodle" fill="none" style="bottom: 528px;left: -1px;width: 40px;height: 40px;" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
            <circle cx="25" cy="25" fill="#f5a623" r="15" stroke="#2d2a26" stroke-width="2"></circle>
            <path d="M5 25H10M40 25H45M25 5V10M25 40V45" stroke="#2d2a26" stroke-width="2"></path>
        </svg>
        <svg class="doodle" fill="none" style="bottom: 7px;left: 60px;width: 30px;height: 30px;" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
            <polygon fill="#f5a623" points="25,10 45,40 5,40" stroke="#2d2a26" stroke-linejoin="round" stroke-width="2"></polygon>
        </svg>

        <!-- Header Section -->
        <div class="text-center mb-6 pt-6" style="padding-top: 0rem">
            <div class="header-banner">
                <h1 id="title" class="text-2xl font-bold playful-font tracking-wide text-gray-900">
                    二年级口算题（450以内）
                </h1>
            </div>
        </div>

        <!-- Math Problems Grid -->
        <div id="problems"></div>
    </div>

    <script>
        function getDateString() {
            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${month}${day}`;
        }

        // 计算表达式结果
        function calculateExpr(expr) {
            try {
                const safeExpr = expr.replace(/×/g, '*').replace(/÷/g, '/');
                return eval(safeExpr);
            } catch (e) {
                return 0;
            }
        }

        // 验证结果是否在有效范围内 (0 到 450,且为整数)
        function validResult(expr) {
            try {
                const result = calculateExpr(expr);
                // 结果必须是整数,且在 0 到 450 之间
                return typeof result === 'number' && result >= 0 && result <= 450 && Number.isInteger(result);
            } catch (e) {
                return false;
            }
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // 生成混合运算 (三元算式)
        function generateMixedProblem() {
            const problems = [];
            const answers = [];
            let attempts = 0;
            while (problems.length < 30 && attempts < 1000) {
                attempts++;
                const a = randomInt(20, 250);
                const b = randomInt(10, 200);
                const c = randomInt(10, 100);
                const ops = ['+', '-'];
                const op1 = ops[randomInt(0, 1)];
                const op2 = ops[randomInt(0, 1)];
                const expr = `${a}${op1}${b}${op2}${c}`;

                if (validResult(expr)) {
                    problems.push(expr + ' = ');
                    answers.push(calculateExpr(expr));
                }
            }
            return { problems, answers };
        }

        // 生成普通运算 【题型比例: 加法10% 减法10% 乘法40% 除法40%】
        function generateNormalProblems() {
            const problems = [];
            const answers = [];
            let attempts = 0;
            while (problems.length < 120 && attempts < 2000) {
                attempts++;
                const rand = Math.random() * 100;
                let op, expr;

                // 【关键】题型比例: 加法10% 减法10% 乘法40% 除法40%
                if (rand < 10) { // 加法 10%
                    op = '+';
                    const a = randomInt(20, 250);
                    const b = randomInt(20, 200);
                    expr = `${a} + ${b}`;
                } else if (rand < 20) { // 减法 10%
                    op = '-';
                    const a = randomInt(30, 450);
                    const b = randomInt(20, 450);
                    const max = Math.max(a, b);
                    const min = Math.min(a, b);
                    expr = `${max} - ${min}`;
                } else if (rand < 60) { // 乘法 40%
                    op = '×';
                    const a = randomInt(2, 25);
                    const b = randomInt(2, 18);
                    expr = `${a} × ${b}`;
                } else { // 除法 40%
                    op = '÷';
                    const b = randomInt(2, 15);
                    const quotient = randomInt(2, 30); // 商的范围
                    const a = b * quotient;
                    if (a <= 450) { // 确保被除数不超过450
                        expr = `${a} ÷ ${b}`;
                    } else {
                        continue; // 跳过这次循环
                    }
                }

                if (validResult(expr)) {
                    problems.push(expr + ' = ');
                    answers.push(calculateExpr(expr));
                }
            }
            return { problems, answers };
        }

        function generateProblems() {
            const dateStr = getDateString();
            document.getElementById('title').textContent = `二年级口算题 (450以内) - ${dateStr}`;

            const mixed = generateMixedProblem();
            const normal = generateNormalProblems();

            // 补足数量
            while (mixed.problems.length < 30) {
                mixed.problems.push("50 + 50 + 50 = ");
                mixed.answers.push(150);
            }
            while (normal.problems.length < 120) {
                normal.problems.push("50 + 50 = ");
                normal.answers.push(100);
            }

            const allProblems = [];
            const allAnswers = [];
            let mIdx = 0, nIdx = 0;

            for (let i = 0; i < 150; i++) {
                // 每 5 题插入 1 个混合运算题目
                if (i % 5 === 0 && mIdx < 30) {
                    allProblems.push(mixed.problems[mIdx]);
                    allAnswers.push(mixed.answers[mIdx]);
                    mIdx++;
                } else {
                    allProblems.push(normal.problems[nIdx]);
                    allAnswers.push(normal.answers[nIdx]);
                    nIdx++;
                }
            }

            // 渲染HTML
            let html = '';
            for (let i = 0; i < 150; i += 5) {
                html += '<div class="problem-line">';
                for (let j = 0; j < 5; j++) {
                    const p = allProblems[i + j] || "";
                    html += `<div class="problem">${p}</div>`;
                }
                html += '</div>';
            }
            document.getElementById('problems').innerHTML = html;

            // 控制台打印答案
            console.clear();
            console.log(`二年级口算题 (450以内) - ${dateStr}`);
            console.log('-----------------------------------');

            for(let i = 0; i < 150; i += 5) {
                const rowAnswers = allAnswers.slice(i, i + 5);
                // 使用制表符对齐,方便查看
                console.log(rowAnswers.join('\t\t'));
            }
            console.log('-----------------------------------');
        }

        // 初始化
        window.onload = generateProblems;
    </script>
</body>
</html>
